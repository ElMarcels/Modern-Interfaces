<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #1a45d0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Container Entry Animation */
        @keyframes containerEntry {
            0% {
                opacity: 0;
                transform: scale(0.96) translateY(20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .container {
            background-color: #fff;
            border-radius: 45px;
            width: 950px;
            max-width: 95%;
            height: 620px;
            position: relative;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            opacity: 0;
            animation: containerEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Forms Panel */
        .forms-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            z-index: 5;
        }

        .form-box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 50px;
            box-sizing: border-box;
            transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s;
        }

        .reset-box {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateY(0);
        }

        .container.submitted .reset-box {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-30px) scale(0.95);
        }

        .success-box {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(30px) scale(0.95);
        }

        .container.submitted .success-box {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        .form-box form {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
        }

        /* Staggered Form Elements Fade-In */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-box form > *,
        .success-box > * {
            opacity: 0;
        }

        .container:not(.submitted) .reset-box form > * {
            animation: fadeInUp 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .container.submitted .success-box > * {
            animation: fadeInUp 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .form-box form > *:nth-child(1) { animation-delay: 0.1s; }
        .form-box form > *:nth-child(2) { animation-delay: 0.16s; }
        .form-box form > *:nth-child(3) { animation-delay: 0.22s; }
        .form-box form > *:nth-child(4) { animation-delay: 0.28s; }
        .form-box form > *:nth-child(5) { animation-delay: 0.34s; }

        .success-box > *:nth-child(1) { animation-delay: 0.1s; }
        .success-box > *:nth-child(2) { animation-delay: 0.18s; }
        .success-box > *:nth-child(3) { animation-delay: 0.26s; }
        .success-box > *:nth-child(4) { animation-delay: 0.34s; }

        /* Header Style */
        .header-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
            text-align: center;
        }

        .header-icon {
            font-size: 32px;
            margin-bottom: 10px;
            transition: transform 0.3s ease;
        }
        
        .form-box:hover .header-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .form-box h2 {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
            margin: 0 0 6px 0;
            letter-spacing: -0.5px;
        }

        .form-box .subtitle {
            font-size: 13.5px;
            color: #6b7280;
            margin: 0;
            font-weight: 400;
        }

        /* Input Styles */
        .input-group {
            position: relative;
            width: 100%;
            margin-bottom: 24px;
        }

        .input-group input {
            width: 100%;
            height: 48px;
            padding: 0 20px;
            padding-right: 48px;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            font-size: 14px;
            color: #1f2937;
            outline: none;
            transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            background-color: #fff;
            box-sizing: border-box;
        }

        .input-group input::placeholder {
            color: #9ca3af;
        }

        .input-group input:focus {
            border-color: #1a45d0;
            box-shadow: 0 0 0 4px rgba(26, 69, 208, 0.1);
        }

        .input-group .input-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 15px;
            transition: color 0.25s ease, transform 0.25s ease;
        }

        /* Input icon focus effect */
        .input-group input:focus ~ .input-icon {
            color: #1a45d0;
            transform: translateY(-50%) scale(1.1);
        }

        /* Button Styling */
        .btn-primary {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 24px;
            background-color: #1a45d0;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(26, 69, 208, 0.15);
            margin-bottom: 24px;
        }

        .btn-primary:hover {
            background-color: #1437a8;
            box-shadow: 0 8px 20px rgba(26, 69, 208, 0.25);
            transform: translateY(-1.5px);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* Navigation link footer */
        .toggle-text {
            font-size: 13px;
            color: #6b7280;
            text-align: center;
            width: 100%;
        }

        .toggle-text a {
            color: #1a45d0;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.25s ease;
            margin-left: 4px;
            position: relative;
            display: inline-block;
        }

        .toggle-text a::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 1.5px;
            bottom: -2px;
            left: 0;
            background-color: #1a45d0;
            transform-origin: bottom right;
            transition: transform 0.25s ease-out;
        }

        .toggle-text a:hover {
            color: #1437a8;
        }

        .toggle-text a:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
            background-color: #1437a8;
        }

        /* Success screen specifics */
        .success-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 50px;
        }

        .success-icon-wrapper {
            font-size: 56px;
            color: #10b981;
            margin-bottom: 20px;
        }

        .success-box h2 {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 10px;
        }

        .success-box p {
            font-size: 14.5px;
            color: #6b7280;
            line-height: 1.5;
            margin-bottom: 30px;
            max-width: 320px;
        }

        /* Illustration Card */
        .illustration-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
            z-index: 10;
        }

        .illustration-card {
            width: 100%;
            height: 100%;
            border-radius: 35px;
            background-image: url('blue_fluid_art.png');
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }
    </style>
</head>

<body>

    <div class="container" id="container">
        <!-- Forms Panel (Left Column) -->
        <div class="forms-container">
            <!-- Reset Form Box -->
            <div class="form-box reset-box">
                <form id="resetForm" onsubmit="handleResetSubmit(event);">
                    <div class="header-wrapper">
                        <div class="header-icon">🔑</div>
                        <h2>Forgot password?</h2>
                        <p class="subtitle">Enter your email and we'll send you a recovery link.</p>
                    </div>

                    <div class="input-group">
                        <input type="email" id="resetEmail" placeholder="Email" required autocomplete="email">
                        <i class="fa-regular fa-envelope input-icon"></i>
                    </div>

                    <button type="submit" class="btn-primary">Send reset link</button>

                    <div class="toggle-text">
                        Remembered it?<a href="index.html">Back to login</a>
                    </div>
                </form>
            </div>

            <!-- Success State Box -->
            <div class="form-box success-box">
                <div class="success-icon-wrapper">
                    <i class="fa-regular fa-circle-check"></i>
                </div>
                <h2>Check your email</h2>
                <p>We've sent a password recovery link to <strong id="sentEmail">your email</strong>. Please follow the instructions to reset your password.</p>
                <button type="button" class="btn-primary" onclick="window.location.href='index.html';" style="max-width: 220px; margin-bottom: 0;">Back to login</button>
            </div>
        </div>

        <!-- Illustration Panel (Right Column) -->
        <div class="illustration-container">
            <div class="illustration-card"></div>
        </div>
    </div>

    <script>
        function handleResetSubmit(event) {
            event.preventDefault();
            const emailInput = document.getElementById('resetEmail');
            const sentEmailSpan = document.getElementById('sentEmail');
            
            // Set email in success screen
            sentEmailSpan.textContent = emailInput.value;
            
            // Toggle submitted state to trigger transition animations
            const container = document.getElementById('container');
            container.classList.add('submitted');
        }
    </script>
</body>

</html>
